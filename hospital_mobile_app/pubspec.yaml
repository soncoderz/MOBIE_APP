name: hospital_mobile_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Toast/notifications
  bot_toast: ^4.1.3
  # State Management
  provider: ^6.1.1
  
  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Authentication
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  
  # Payment
  url_launcher: ^6.2.3
  webview_flutter: ^4.4.4
  app_links: ^6.3.3
  
  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  image_picker: ^1.0.7
  socket_io_client: ^2.0.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
